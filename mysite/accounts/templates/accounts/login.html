{% extends "base_layout.html" %}
{% load static %}

{% block title %}Login{% endblock title %}

{% block content %}
<div class="form-container auth-page">
    <h1>Login</h1>
    <form class="form auth-form" action="{% url 'accounts:login' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        {% if request.GET.next %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% endif %}
        <button type="submit">Login</button>
    </form>
</div>
{% endblock content %}
