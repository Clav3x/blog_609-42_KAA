{% extends "base_layout.html" %}
{% load static %}

{% block title %}Sign Up{% endblock title %}

{% block content %}
<div class="form-container auth-page">
    <h1>Sign Up</h1>
    <form class="form auth-form" action="{% url 'accounts:signup' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>
</div>
{% endblock content %}
